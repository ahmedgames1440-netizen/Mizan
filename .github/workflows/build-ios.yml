name: Build iOS App

# يبني نسخة أساسية من ميزان لـ iOS عبر kivy-ios على macOS runner.
# هذي النسخة الأولى لا تتضمن matplotlib/reportlab (الرسوم البيانية وتصدير
# PDF) لأن هذي المكتبات غير مدعومة بشكل مستقر حاليًا في kivy-ios — راجع
# core/optional_deps.py لمعرفة كيف يتعامل الكود مع غيابها بأمان.
#
# الناتج: مشروع Xcode جاهز (غير موقّع) يُرفع كـ artifact. لتثبيته على آيفون
# حقيقي، حمّل الـ artifact وافتحه على Mac بـ Xcode، اختر فريقك (Apple ID
# مجاني يكفي)، وثبّته مباشرة بتوصيل الآيفون بكيبل.

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-ios.yml'
      - 'ios_main.py'

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          brew install autoconf automake libtool pkg-config
          brew link libtool || true

      - name: Install kivy-ios + Cython
        run: |
          python3 -m pip install --upgrade pip
          # Cython 3.x غير متوافق مع أغلب recipes الحالية بـ kivy-ios، نثبّت نسخة مثبّتة معروفة التوافق.
          python3 -m pip install "cython<3.0" kivy-ios

      - name: Cache kivy-ios toolchain build
        uses: actions/cache@v4
        with:
          path: .kivy-ios-dist
          key: kivy-ios-dist-${{ runner.os }}-${{ hashFiles('ios_requirements.txt') }}

      - name: Build core toolchain (python3 + kivy)
        run: |
          mkdir -p .kivy-ios-dist
          cd .kivy-ios-dist
          toolchain build python3 kivy

      - name: Build required pure/binary recipes
        run: |
          cd .kivy-ios-dist
          # المكتبات الأساسية المطلوبة للنسخة الأولى (بدون matplotlib/reportlab/numpy).
          # openpyxl/arabic_reshaper/python-bidi مكتبات بايثون خالصة، تُثبّت عبر pip
          # داخل بيئة hostpython3 الخاصة بـ kivy-ios مباشرة بدون الحاجة لـ recipe مخصص.
          toolchain pip install openpyxl arabic-reshaper python-bidi plyer

      - name: Stage clean app source (exclude build cache)
        run: |
          # toolchain create يحزم أي شيء موجود داخل المجلد المُمرَّر له كمصدر
          # التطبيق. تمريره $GITHUB_WORKSPACE مباشرة كان يُدخل مجلد
          # .kivy-ios-dist نفسه (بما فيه مكتبة بايثون القياسية الكاملة، ومنها
          # Lib/test التي تحتوي عمدًا على ملفات بها أخطاء صياغة لاختبار
          # المحلل اللغوي) داخل تطبيقنا. هذا يجعل خطوة compileall أثناء
          # الأرشفة تفشل بكود خروج غير صفري رغم أن كود التطبيق نفسه سليم.
          # نبني هنا نسخة نظيفة من مصدر التطبيق فقط (بدون .git/.github/.kivy-ios-dist)
          # ونمررها لـ toolchain create بدل مجلد العمل كامل.
          rm -rf "$RUNNER_TEMP/mizan-app-src"
          mkdir -p "$RUNNER_TEMP/mizan-app-src"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.kivy-ios-dist' \
            "$GITHUB_WORKSPACE/" "$RUNNER_TEMP/mizan-app-src/"

      - name: Create Xcode project
        run: |
          cd .kivy-ios-dist
          toolchain create Mizan "$RUNNER_TEMP/mizan-app-src"

      - name: Fix deployment target
        run: |
          cd .kivy-ios-dist/Mizan-ios
          PROJECT_PATH=$(find . -maxdepth 1 -name "*.xcodeproj" | head -n 1)
          # toolchain create يضبط IPHONEOS_DEPLOYMENT_TARGET = 9.0 افتراضيًا،
          # وهذي قيمة أقدم من أدنى حد مدعوم حاليًا (12.0) وسترفضها Apple
          # عند أي محاولة توزيع فعلية لاحقًا. نرفعها لقيمة حديثة مقبولة.
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 9.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' \
            "$PROJECT_PATH/project.pbxproj"

      - name: Archive Xcode project (unsigned)
        run: |
          cd .kivy-ios-dist/Mizan-ios
          # toolchain create قد يولّد اسم ملف .xcodeproj بحروف مختلفة عن
          # الاسم الممرر له (مثلاً "mizan.xcodeproj" بحروف صغيرة)، ونفس
          # الشيء بالنسبة لاسم الـ scheme الداخلي. نكتشف الاسم الفعلي
          # تلقائيًا بدل افتراض ثابت كان يسبب فشل "scheme not found".
          PROJECT_PATH=$(find . -maxdepth 1 -name "*.xcodeproj" | head -n 1)
          echo "Found project: $PROJECT_PATH"

          SCHEME_NAME=$(xcodebuild -list -project "$PROJECT_PATH" -json | \
            python3 -c "import json,sys; print(json.load(sys.stdin)['project']['schemes'][0])")
          echo "Found scheme: $SCHEME_NAME"

          # خطأ معروف في kivy-ios: خطوة "Run Script" بمشروع Xcode تحاول
          # عبر rsync نسخ ملف مثال افتراضي (faust_github.jpg) من توزيعة
          # kivy-ios نفسها — ملف غير موجود فعليًا فيفشل rsync بـ "file has
          # vanished" (exit code 24) ويُسقط المحاولة الأولى للأرشفة، رغم
          # أن ملفات تطبيقنا الحقيقية تُنسخ بنجاح أثناء هذي المحاولة. على
          # المحاولة الثانية يكون النسخ غير تفاضلي (لا يعيد محاولة نسخ
          # الملف الوهمي) فينجح البناء فعليًا. لذلك نسمح بفشل أول محاولة
          # ونعيد المحاولة مباشرة.
          xcodebuild -project "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath "$GITHUB_WORKSPACE/Mizan.xcarchive" \
            archive || true

          echo "=== Retrying archive (expected to succeed this time) ==="
          xcodebuild -project "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath "$GITHUB_WORKSPACE/Mizan.xcarchive" \
            archive

      - name: Upload Xcode project + archive
        uses: actions/upload-artifact@v4
        with:
          name: mizan-ios-xcodeproj
          path: |
            .kivy-ios-dist/Mizan-ios
            Mizan.xcarchive
          retention-days: 14
